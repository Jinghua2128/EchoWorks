<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="Practice a workplace feedback conversation with Sarah through an interactive visual novel scenario."
  />
  <meta name="theme-color" content="#d71920" />
  <title>Sarah Scenario | Feedback Playbook</title>
  <link rel="preload" as="image" href="assets/office-vn.webp" />
  <link rel="preload" as="image" href="assets/office-success.webp" />
  <link rel="preload" as="image" href="assets/office-tense.webp" />
  <link rel="preload" as="image" href="assets/office-mentor.webp" />
  <link rel="preload" as="image" href="assets/manager.webp" />
  <link rel="preload" as="image" href="assets/sarah.webp" />
  <link rel="stylesheet" href="assets/css/novel.css?v=20260701-dynamic" />
  <script type="module" src="assets/js/novel.js?v=20260701-dynamic"></script>
</head>

<body>
  <main class="novel-shell" aria-labelledby="scenarioTitle">
    <div class="scene-backdrop" aria-hidden="true"></div>

    <header class="novel-header">
      <a class="icon-button" href="index.html#home" aria-label="Back to Feedback Playbook">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5 8 12l7 7" /></svg>
      </a>
      <div>
        <p>Feedback Playbook</p>
        <h1 id="scenarioTitle">Sarah Scenario</h1>
      </div>
      <button class="icon-button" type="button" data-action="restart" aria-label="Restart scenario">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12a8 8 0 1 0 2.3-5.7M4 5v5h5" /></svg>
      </button>
    </header>

    <section class="stage" aria-label="Conversation scene">
      <img src="assets/manager.webp" data-idle="assets/manager.webp" data-talk="assets/manager_talk.webp" id="manager" class="character manager" alt="Manager" decoding="async" />
      <img src="assets/sarah.webp" data-idle="assets/sarah.webp" data-talk="assets/sarah_talk.webp" id="sarah" class="character sarah" alt="Sarah Tan" decoding="async" />
    </section>

    <section class="choice-panel" id="choices" aria-label="Response choices" hidden></section>

    <section class="dialogue-panel" aria-live="polite">
      <div class="dialogue-meta">
        <span class="speaker" id="speakerName"></span>
        <span class="scene-count" id="sceneCount"></span>
      </div>
      <div class="dialogue-text" id="dialogueText"></div>
      <div class="dialogue-actions">
        <button class="text-button" type="button" data-action="advance">Continue</button>
        <span>Press Enter or Space</span>
      </div>
    </section>

    <div class="result-toast" id="result" role="status" aria-live="polite" hidden></div>
  </main>
</body>
</html>
